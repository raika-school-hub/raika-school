<!DOCTYPE html>
<html>
<head>
<title>Raika School Management Hub</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

h1{
color:#2e86de;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}
</style>

</head>

<body>

<h1>Raika School Management Hub</h1>

<p>Welcome to the Raika School Website</p>

<h2>Attendance</h2>

<p>Total Students: <span id="total">0</span></p>
<p>Present: <span id="present">0</span></p>
<p>Absent: <span id="absent">0</span></p>

<button onclick="markPresent()">Present</button>
<button onclick="markAbsent()">Absent</button>

<script>

let total = 0
let present = 0
let absent = 0

function markPresent(){
total++
present++
update()
}

function markAbsent(){
total++
absent++
update()
}

function update(){
document.getElementById("total").innerText = total
document.getElementById("present").innerText = present
document.getElementById("absent").innerText = absent
}

</script>

</body>
</html>
