<script>

/* ===============================
STUDENTS DATABASE
=============================== */

let students = [
"Aarvi","Swamini","Durva","Ishani K","Ishani S","Paridhi","Manasvini",
"Shereya","Shravni","Anaya","Dhanshri","Saanvi","Swarda","Hetal",
"Maanvi","Arohi","Satvida","Aradhya","Lavanya","Grishma",
"Sairaj","Hriday","Ansh","Gurutva","Anvay","Aksad","Rutvik",
"Khushal","Siddhart","Rajveer","Ayush","Arimeet","Yash","Dheeraj"
]

students.sort()

let studentAttendance = students.map(()=>({p:0,w:0}))

let undoStack = []
let redoStack = []

function saveState(){
undoStack.push(JSON.stringify({students,studentAttendance}))
redoStack=[]
}

function undo(){
if(undoStack.length===0) return
redoStack.push(JSON.stringify({students,studentAttendance}))
let state = JSON.parse(undoStack.pop())
students = state.students
studentAttendance = state.studentAttendance
renderStudents()
}

function redo(){
if(redoStack.length===0) return
undoStack.push(JSON.stringify({students,studentAttendance}))
let state = JSON.parse(redoStack.pop())
students = state.students
studentAttendance = state.studentAttendance
renderStudents()
}

function renderStudents(){

students.sort()

let html=""

students.forEach((name,i)=>{

let p=studentAttendance[i].p
let w=studentAttendance[i].w
let per=w?Math.round((p/w)*100):0

html+=`
<tr>
<td>${i+1}</td>
<td>${name}</td>
<td>${p}</td>
<td>${w}</td>
<td>${per}%</td>
<td>
<button onclick="presentStudent(${i})">P</button>
<button onclick="absentStudent(${i})">A</button>
<button onclick="editStudent(${i})">Edit</button>
<button onclick="deleteStudent(${i})">Delete</button>
</td>
</tr>
`

})

document.getElementById("studentTable").innerHTML = html

}

function addStudent(){

let name = document.getElementById("newStudent").value
if(name==="") return

saveState()

students.push(name)
studentAttendance.push({p:0,w:0})

renderStudents()

}

function editStudent(i){

saveState()

let name = prompt("Edit name",students[i])
if(name) students[i]=name

renderStudents()

}

function deleteStudent(i){

saveState()

students.splice(i,1)
studentAttendance.splice(i,1)

renderStudents()

}

function presentStudent(i){

saveState()

studentAttendance[i].p++
studentAttendance[i].w++

renderStudents()

}

function absentStudent(i){

saveState()

studentAttendance[i].w++

renderStudents()

}

/* ===============================
TEACHERS DATABASE
=============================== */

let teachers=[

{name:"Sandra Miss",subject:"Geography",class:"6A"},
{name:"Neeta Miss",subject:"Hindi",class:"6A"},
{name:"Pratiksha Miss",subject:"Math",class:"6A"},
{name:"Monali Miss",subject:"Science",class:"6A"},
{name:"Rupali Miss",subject:"Marathi",class:"6A"},
{name:"Dipti Miss",subject:"Computer",class:"6A"},
{name:"Pranita Miss",subject:"Art & Craft",class:"6A"},
{name:"Zui Miss",subject:"Speech & Drama",class:"6A"},
{name:"Sameer Sir",subject:"Sports",class:"All"},
{name:"Rasul Sir",subject:"Sports",class:"All"}

]

let teacherAttendance = teachers.map(()=>({p:0,w:0}))

function renderTeachers(){

let html=""

teachers.forEach((t,i)=>{

let p=teacherAttendance[i].p
let w=teacherAttendance[i].w
let per=w?Math.round((p/w)*100):0

html+=`
<tr>
<td>${i+1}</td>
<td>${t.name}</td>
<td>${t.subject}</td>
<td>${t.class}</td>
<td>${p}</td>
<td>${w}</td>
<td>${per}%</td>
<td>
<button onclick="presentTeacher(${i})">P</button>
<button onclick="absentTeacher(${i})">A</button>
<button onclick="editTeacher(${i})">Edit</button>
<button onclick="deleteTeacher(${i})">Delete</button>
</td>
</tr>
`

})

document.getElementById("teacherTable").innerHTML = html

}

function addTeacher(){

let name=document.getElementById("tName").value
let subject=document.getElementById("tSubject").value
let cls=document.getElementById("tClass").value

if(name==="") return

teachers.push({name:name,subject:subject,class:cls})
teacherAttendance.push({p:0,w:0})

renderTeachers()

}

function editTeacher(i){

let name=prompt("Teacher name",teachers[i].name)
let subject=prompt("Subject",teachers[i].subject)
let cls=prompt("Class",teachers[i].class)

if(name) teachers[i].name=name
if(subject) teachers[i].subject=subject
if(cls) teachers[i].class=cls

renderTeachers()

}

function deleteTeacher(i){

teachers.splice(i,1)
teacherAttendance.splice(i,1)

renderTeachers()

}

function presentTeacher(i){

teacherAttendance[i].p++
teacherAttendance[i].w++

renderTeachers()

}

function absentTeacher(i){

teacherAttendance[i].w++

renderTeachers()

}

/* ===============================
START SYSTEM
=============================== */

renderStudents()
renderTeachers()

</script>
